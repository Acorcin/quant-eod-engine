version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-quant_eod}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quant_eod"]
      interval: 10s
      timeout: 5s
      retries: 5

  quant-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_engine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
